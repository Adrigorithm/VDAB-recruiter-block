<!doctype html>
<html lang="en-GB">
    <head>
        <meta charset="utf-8" />
        <link rel="stylesheet" href="popup.css" />
    </head>

    <body>
        <fieldset class="column">
            <legend class="padding-x">Mode</legend>
            <p>
                This is used for the extension to decide what to do when a
                vacancy is labeled as "made by a recruiting agency".
            </p>

            <div id="modeRadiosContainer" class="column width-fit">
                <div>
                    <input type="radio" id="toBottom" name="mode" value="0" />
                    <label for="toBottom">Push to bottom</label>
                </div>

                <div>
                    <input
                        type="radio"
                        id="toBottomDim"
                        name="mode"
                        value="1"
                    />
                    <label for="toBottom">Push to bottom + dim</label>
                </div>

                <div>
                    <input type="radio" id="remove" name="mode" value="2" />
                    <label for="toBottom">Remove</label>
                </div>

                <button class="spacer-top" id="applyMode">Apply</button>
            </div>
        </fieldset>

        <fieldset class="spacer-top">
            <legend class="padding-x">Recruiter names</legend>

            <div class="column width-fit gap">
                <div class="flex">
                    <select class="grow" id="recruiterNames">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>

                    <button id="removeRecruiterName">Remove</button>
                </div>

                <div class="flex">
                    <input
                        class="padding-x grow"
                        id="selectedRecruiterName"
                        type="text"
                    />
                    <button id="addRecruiterName">Add</button>
                </div>
            </div>
        </fieldset>

        <fieldset class="spacer-top">
            <legend class="padding-x">Recruiter logo alts</legend>

            <div class="column width-fit gap">
                <div class="flex">
                    <select class="grow" id="recruiterLogoAlts">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>

                    <button id="removeRecruiterLogoAlt">Remove</button>
                </div>

                <div class="flex">
                    <input
                        class="padding-x grow"
                        id="newRecruiterLogoAlt"
                        type="text"
                    />
                    <button id="addRecruiterLogoAlt">Add</button>
                </div>
            </div>
        </fieldset>

        <script src="popup.js"></script>
    </body>
</html>
